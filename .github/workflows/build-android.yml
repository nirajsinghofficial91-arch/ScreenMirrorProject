name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x android_app/gradlew
        # Create a gradlew file if it doesn't exist, as it might have been missed in the initial stub
        continue-on-error: true 

      - name: Generate Gradle Wrapper (if missing)
        working-directory: ./android_app
        run: gradle wrapper --gradle-version 8.1.1
        
      - name: Build with Gradle
        working-directory: ./android_app
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android_app/app/build/outputs/apk/release/app-release-unsigned.apk
