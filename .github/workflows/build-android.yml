name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Generate Gradle Wrapper
        working-directory: ./android_app
        run: |
          # The gradle-wrapper.jar is required but too large to commit.
          # Generate it fresh using the Gradle setup from the previous step.
          gradle wrapper --gradle-version 8.0

      - name: Grant execute permission for gradlew
        run: chmod +x android_app/gradlew

      - name: Build Debug APK
        working-directory: ./android_app
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ScreenMirror-debug-apk
          path: android_app/app/build/outputs/apk/debug/*.apk
